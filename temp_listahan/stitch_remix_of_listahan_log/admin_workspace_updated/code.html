<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">

            </p>
</div>

<!-- Field Console Card (Selected State Example) -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest rounded-xl shadow-[0_8px_32px_rgba(0,56,168,0.06)] border-l-4 border-primary-container text-left transition-all hover:scale-[1.02] active:scale-95 duration-300 overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-9xl" data-icon="badge">badge</span>
</div>
<div class="bg-tertiary-container p-4 rounded-full mb-6">
<span class="material-symbols-outlined text-on-tertiary-container text-3xl" data-icon="construction" style="font-variation-settings: 'FILL' 1;">construction</span>
</div>
<h2 class="text-2xl font-bold text-primary-container mb-3">Field Console</h2>
<p class="text-on-surface-variant leading-relaxed mb-8">
                    Gamitin ito para sa on-the-ground enrollment, verification, at listahan ng mga miyembro sa bawat komunidad.
                </p>
<div class="flex items-center gap-2 text-primary-container font-bold">
<span>Pumasok sa Console</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
<!-- Dashboard Card -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest rounded-xl shadow-[0_4px_16px_rgba(0,56,168,0.04)] text-left transition-all hover:shadow-[0_8px_32px_rgba(0,56,168,0.08)] hover:scale-[1.02] active:scale-95 duration-300 overflow-hidden">

<span class="material-symbols-outlined text-9xl" data-icon="analytics">analytics</span>
</div>
<div class="bg-surface-container-high p-4 rounded-full mb-6 group-hover:bg-tertiary-fixed transition-colors">
<span class="material-symbols-outlined text-on-surface-variant text-3xl group-hover:text-on-tertiary-fixed transition-colors" data-icon="dashboard">dashboard</span>
</div>
<h2 class="text-2xl font-bold text-on-surface mb-3">Dashboard</h2>
<p class="text-on-surface-variant leading-relaxed mb-8">
                    Suriin ang kabuuang datos, bumuo ng mga ulat, at bantayan ang daloy ng pondo sa real-time.
                </p>
<div class="flex items-center gap-2 text-on-surface-variant font-bold group-hover:text-primary transition-colors">
<span>Buksan ang Dashboard</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</div>

</div>

<span class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase">Verified</span>
</div>
