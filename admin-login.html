<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriFund PH - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#002576",
                        "primary-container": "#0038a8",
                        "primary-fixed": "#dce1ff",
                        "primary-fixed-dim": "#b6c4ff",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#00164f",
                        "on-primary-fixed-variant": "#093cab",
                        "on-primary-container": "#96adff",
                        "secondary": "#bb001e",
                        "secondary-container": "#e12531",
                        "secondary-fixed": "#ffdad7",
                        "secondary-fixed-dim": "#ffb3ae",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#410004",
                        "on-secondary-fixed-variant": "#930015",
                        "on-secondary-container": "#fffbff",
                        "tertiary": "#715c00",
                        "tertiary-container": "#cca800",
                        "tertiary-fixed": "#ffe17b",
                        "tertiary-fixed-dim": "#ecc300",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#231b00",
                        "on-tertiary-fixed-variant": "#554500",
                        "on-tertiary-container": "#4d3e00",
                        "background": "#f7f9fe",
                        "surface": "#f7f9fe",
                        "surface-bright": "#f7f9fe",
                        "surface-dim": "#d8dadf",
                        "surface-tint": "#3056c4",
                        "surface-variant": "#e0e2e7",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f1f4f9",
                        "surface-container": "#eceef3",
                        "surface-container-high": "#e6e8ed",
                        "surface-container-highest": "#e0e2e7",
                        "on-background": "#181c20",
                        "on-surface": "#181c20",
                        "on-surface-variant": "#444653",
                        "outline": "#747685",
                        "outline-variant": "#c4c5d5",
                        "inverse-surface": "#2d3135",
                        "inverse-on-surface": "#eff1f6",
                        "inverse-primary": "#b6c4ff",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .vinta-gradient { background: linear-gradient(135deg, #002576 0%, #0038a8 100%); }
        input:focus { outline: none; }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">

    <!-- Header matching Landing Page -->
    <header class="w-full bg-surface-container-lowest sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-2xl">shield_person</span>
                <div class="font-headline font-bold text-[22px] tracking-tight flex items-center">
                    <span class="text-primary">Veri</span><span class="text-secondary-container">Fund</span>
                </div>
            </div>
            <div></div> <!-- Right side: keep it clean -->
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-8 relative w-full">
        <!-- Login Card -->
        <div class="bg-surface-container-lowest w-full max-w-[440px] rounded-[1.25rem] p-8 shadow-[0_8px_32px_rgba(0,56,168,0.06)] flex flex-col items-center">
            
            <div class="mb-8 text-center w-full">
                <div class="inline-flex items-center justify-center w-12 h-12 vinta-gradient rounded-xl shadow-[0_4px_16px_rgba(0,56,168,0.12)] mb-4">
                    <span class="material-symbols-outlined text-white text-2xl">account_balance</span>
                </div>
                <h1 class="text-[28px] font-headline font-bold text-on-surface tracking-tight leading-tight mb-2">Admin Login</h1>
                <p class="text-[14px] text-on-surface-variant">Ipasok ang kredensyal para sa ligtas na pag-access.</p>
            </div>

            <!-- Form -->
            <form onsubmit="event.preventDefault(); window.location.href='admin-workspace.html';" class="w-full space-y-6">
                <!-- Username Field -->
                <div class="space-y-1 w-full">
                    <label class="block text-[12px] font-bold text-primary uppercase tracking-wide" for="username">Pangalan ng User</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
                            <span class="material-symbols-outlined text-[20px]">person</span>
                        </div>
                        <input class="w-full h-[52px] pl-12 pr-4 bg-surface-container-low border-b-2 border-surface-dim text-on-surface text-[15px] font-medium rounded-t-lg focus:border-primary transition-colors placeholder:text-outline-variant" id="username" placeholder="Hal. juan_delacruz" type="text" required />
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-1 w-full">
                    <div class="flex justify-between items-center">
                        <label class="block text-[12px] font-bold text-primary uppercase tracking-wide" for="password">Password</label>
                        <a href="#" class="text-[12px] font-bold text-primary hover:underline">Nakalimutan?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
                            <span class="material-symbols-outlined text-[20px]">lock</span>
                        </div>
                        <input class="w-full h-[52px] pl-12 pr-12 bg-surface-container-low border-b-2 border-surface-dim text-on-surface text-[15px] font-medium rounded-t-lg focus:border-primary transition-colors placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password" required />
                        <button type="button" class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-primary transition-colors" onclick="togglePassword()">
                            <span class="material-symbols-outlined text-[20px]" id="visibility-icon">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- CTA Button -->
                <div class="pt-2">
                    <button class="w-full h-[52px] vinta-gradient text-white rounded-xl font-bold text-[15px] flex items-center justify-center gap-2 transition-opacity hover:opacity-90 active:opacity-100 shadow-[0_4px_16px_rgba(0,56,168,0.12)]" type="submit">
                        Mag-login sa System
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                    </button>
                </div>
            </form>

            <a href="index.html" class="mt-8 text-[13px] text-on-surface-variant hover:text-on-surface transition-colors flex items-center gap-1 font-medium">
                &larr; Bumalik sa Pangunahing Pahina
            </a>
        </div>
    </main>

    <script>
        function togglePassword() {
            const pwd = document.getElementById("password");
            const icon = document.getElementById("visibility-icon");
            if (pwd.type === "password") {
                pwd.type = "text";
                icon.innerText = "visibility_off";
            } else {
                pwd.type = "password";
                icon.innerText = "visibility";
            }
        }
    </script>
</body>
</html>
